name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # 18:00 UTC = 03:00 KST
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      # Fork of yoshi389111/github-profile-3d-contrib adding the HEIGHT_SCALE
      # env var (lower = taller blocks). Pinned to commit 25a61c4.
      - uses: smyeong123/github-profile-3d-contrib@25a61c428c648989654b3b69047c1448c902fe59
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 20
          HEIGHT_SCALE: 3
      - name: Commit & Push generated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git commit -m "chore: update 3D contribution calendar" || echo "nothing to commit"
          git push
